<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>hoard chat</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --panel2:#1b1f28; --user:#2a3344; --asst:#1c2029; --tx:#e6e8ee; --mut:#8b93a3; --acc:#5b9dff; --stop:#e0556b; --code:#0b0d11; --line:#232733; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--tx); font:15px/1.55 -apple-system,Segoe UI,Roboto,sans-serif; -webkit-text-size-adjust:100%; overscroll-behavior:none; }
  #app { display:flex; height:100%; height:100dvh; }
  #sidebar { width:264px; flex:0 0 264px; background:var(--panel); border-right:1px solid var(--line); display:flex; flex-direction:column; }
  .sb-head { display:flex; align-items:center; gap:8px; padding:max(12px,env(safe-area-inset-top)) 12px 12px; border-bottom:1px solid var(--line); }
  .sb-head strong { font-size:15px; } .sb-head .grow { flex:1; }
  #convlist { flex:1; overflow-y:auto; padding:8px; }
  .conv { display:flex; align-items:center; gap:6px; padding:9px 10px; border-radius:8px; cursor:pointer; }
  .conv:hover { background:var(--panel2); } .conv.active { background:#243049; }
  .conv .t { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:13.5px; }
  .conv .act { opacity:0; border:none; background:none; color:var(--mut); cursor:pointer; font-size:13px; padding:2px 4px; border-radius:5px; }
  .conv:hover .act, .conv.active .act { opacity:1; } .conv .act:hover { color:var(--tx); background:#0006; }
  @media (hover:none){ .conv .act { opacity:1; } }

  #main { flex:1; display:flex; flex-direction:column; min-width:0; max-width:900px; margin:0 auto; width:100%; position:relative; }
  header { display:flex; align-items:center; gap:8px; padding:max(12px,env(safe-area-inset-top)) 14px 12px; border-bottom:1px solid var(--line); }
  header .dot { width:9px; height:9px; border-radius:50%; background:#caa53a; box-shadow:0 0 6px #caa53a; flex:0 0 auto; }
  header .dot.ready { background:#43c463; box-shadow:0 0 6px #43c463; }
  header h1 { font-size:15px; margin:0; font-weight:600; } header .sub { color:var(--mut); font-size:11.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  header .grow { flex:1; }
  button, select { background:var(--panel); color:var(--tx); border:1px solid #2c3240; border-radius:8px; padding:7px 10px; cursor:pointer; font-size:13px; }
  button:hover, select:hover { border-color:var(--acc); }
  select { padding:6px 8px; max-width:120px; }
  .iconbtn { display:none; padding:6px 9px; font-size:16px; line-height:1; }
  #settings { position:absolute; top:54px; right:12px; z-index:7; width:248px; background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:12px 14px; box-shadow:0 8px 24px #0008; display:none; }
  #settings.open { display:block; }
  #settings label { font-size:13px; display:flex; justify-content:space-between; }
  #settings input[type=range] { width:100%; margin:8px 0 2px; accent-color:var(--acc); }
  #settings .hint { color:var(--mut); font-size:11.5px; }

  #log { flex:1; overflow-y:auto; padding:18px 16px; display:flex; flex-direction:column; gap:14px; }
  .msg { max-width:90%; padding:10px 14px; border-radius:12px; word-wrap:break-word; overflow-wrap:anywhere; }
  .msg.user { align-self:flex-end; background:var(--user); border-bottom-right-radius:3px; }
  .msg.asst { align-self:flex-start; background:var(--asst); border-bottom-left-radius:3px; }
  .msg p { margin:0 0 8px; } .msg p:last-child { margin-bottom:0; }
  .msg pre { position:relative; background:var(--code); border:1px solid var(--line); border-radius:8px; padding:10px 12px; overflow-x:auto; margin:8px 0; }
  .msg code { background:#000a; padding:1px 5px; border-radius:4px; font-size:13px; } .msg pre code { background:none; padding:0; }
  .msg pre .copy { position:absolute; top:6px; right:6px; padding:3px 8px; font-size:11px; background:#0008; border:1px solid var(--line); opacity:.65; } .msg pre:hover .copy { opacity:1; }
  .msg ul,.msg ol { margin:6px 0; padding-left:22px; } .msg li { margin:2px 0; }
  .msg h1,.msg h2,.msg h3 { margin:10px 0 6px; font-size:1.05em; }
  .cursor::after { content:"█"; color:var(--acc); animation:blink 1s steps(2) infinite; } @keyframes blink { 50%{opacity:0;} }
  .empty { margin:auto; color:var(--mut); font-size:13px; text-align:center; }

  footer { padding:10px 16px calc(14px + env(safe-area-inset-bottom)); border-top:1px solid var(--line); }
  .row { display:flex; gap:8px; align-items:flex-end; }
  textarea { flex:1; resize:none; background:var(--panel); color:var(--tx); border:1px solid #2c3240; border-radius:10px; padding:10px 12px; font-family:inherit; font-size:16px; line-height:1.4; max-height:160px; }
  textarea:focus { outline:none; border-color:var(--acc); } textarea.drag { border-color:var(--acc); background:#1a2230; }
  .send { background:var(--acc); border-color:var(--acc); color:#04101f; font-weight:600; min-width:64px; }
  .send.stopbtn { background:var(--stop); border-color:var(--stop); color:#fff; }
  .perfrow { display:flex; align-items:center; gap:10px; margin-top:6px; min-height:16px; }
  .mini { padding:3px 9px; font-size:12px; } .perf { color:var(--mut); font-size:11.5px; }
  #scrim { display:none; position:fixed; inset:0; background:#0008; z-index:5; }
  @media (max-width:760px) {
    #sidebar { position:fixed; z-index:6; left:0; top:0; bottom:0; transform:translateX(-100%); transition:transform .18s ease; box-shadow:2px 0 16px #0007; }
    #sidebar.open { transform:none; } #scrim.open { display:block; } .iconbtn { display:inline-block; }
    select { max-width:84px; }
  }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sb-head"><strong>hoard</strong><span class="grow"></span><button id="newchat">+ New chat</button></div>
    <div id="convlist"></div>
  </aside>
  <div id="main">
    <header>
      <button class="iconbtn" id="menu">☰</button>
      <span class="dot" id="dot"></span>
      <div style="min-width:0"><h1 id="title">hoard</h1><div class="sub" id="sub">connecting…</div></div>
      <span class="grow"></span>
      <select id="model" title="Model"></select>
      <button id="gear" title="Settings">⚙</button>
      <button id="attach">Attach</button>
    </header>
    <div id="settings">
      <label>Temperature <span id="tempval">0.0</span></label>
      <input type="range" id="temp" min="0" max="1.5" step="0.1" value="0">
      <div class="hint">0 = deterministic (greedy). Higher = more varied.</div>
    </div>
    <input type="file" id="fileinput" hidden>
    <div id="log"></div>
    <footer>
      <div class="row">
        <textarea id="box" rows="1" placeholder="Message the model…  (Enter to send, Shift+Enter for newline)"></textarea>
        <button class="send" id="send">Send</button>
      </div>
      <div class="perfrow"><button id="regen" class="mini" hidden>↻ Regenerate</button><span class="perf" id="perf"></span></div>
    </footer>
  </div>
  <div id="scrim"></div>
</div>
<script>
const $=id=>document.getElementById(id);
const log=$('log'), box=$('box'), perf=$('perf'), dot=$('dot'), sub=$('sub'), convlist=$('convlist'), sendBtn=$('send');
let busy=false, ready=false, activeId=null;

function esc(s){ return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function md(src){
  const lines=src.split('\n'); let out=[], i=0;
  const inline=t=>esc(t).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  while(i<lines.length){ let l=lines[i];
    if(/^```/.test(l)){ let code=[]; i++; while(i<lines.length && !/^```/.test(lines[i])) code.push(lines[i++]); i++;
      out.push('<pre><code>'+esc(code.join('\n'))+'</code></pre>'); continue; }
    if(/^#{1,6}\s/.test(l)){ out.push('<h3>'+inline(l.replace(/^#{1,6}\s/,''))+'</h3>'); i++; continue; }
    if(/^\s*[-*]\s/.test(l)){ let it=[]; while(i<lines.length && /^\s*[-*]\s/.test(lines[i])) it.push('<li>'+inline(lines[i++].replace(/^\s*[-*]\s/,''))+'</li>'); out.push('<ul>'+it.join('')+'</ul>'); continue; }
    if(/^\s*\d+\.\s/.test(l)){ let it=[]; while(i<lines.length && /^\s*\d+\.\s/.test(lines[i])) it.push('<li>'+inline(lines[i++].replace(/^\s*\d+\.\s/,''))+'</li>'); out.push('<ol>'+it.join('')+'</ol>'); continue; }
    if(l.trim()===''){ i++; continue; }
    let para=[]; while(i<lines.length && lines[i].trim()!=='' && !/^(```|#{1,6}\s|\s*[-*]\s|\s*\d+\.\s)/.test(lines[i])) para.push(lines[i++]);
    out.push('<p>'+inline(para.join('\n')).replace(/\n/g,'<br>')+'</p>'); }
  return out.join('');
}
function bubble(cls){ const d=document.createElement('div'); d.className='msg '+cls; log.appendChild(d); log.scrollTop=log.scrollHeight; return d; }
function fallbackCopy(t){ const ta=document.createElement('textarea'); ta.value=t; ta.style.cssText='position:fixed;opacity:0'; document.body.appendChild(ta); ta.focus(); ta.select(); try{document.execCommand('copy');}catch(_){} ta.remove(); }
function copyText(t){ if(navigator.clipboard && window.isSecureContext){ navigator.clipboard.writeText(t).catch(()=>fallbackCopy(t)); } else fallbackCopy(t); }
function addCopy(scope){ scope.querySelectorAll('pre:not([data-cp])').forEach(pre=>{ pre.dataset.cp='1';
  const b=document.createElement('button'); b.className='copy'; b.textContent='Copy';
  b.onclick=()=>{ const c=pre.querySelector('code'); copyText(c?c.textContent:pre.textContent); b.textContent='Copied'; setTimeout(()=>b.textContent='Copy',1200); };
  pre.appendChild(b); }); }
async function api(method,path,body){ const r=await fetch(path,{method,headers:body?{'Content-Type':'application/json'}:{},body:body?JSON.stringify(body):undefined}); return r.json(); }

// ---- conversations ----
async function loadConvs(){ try{ const d=await api('GET','/api/conversations'); activeId=d.active; renderConvs(d.conversations); }catch(e){} }
function renderConvs(list){
  convlist.innerHTML=''; if(!list.length){ convlist.innerHTML='<div class="empty">No conversations yet</div>'; return; }
  for(const c of list){
    const row=document.createElement('div'); row.className='conv'+(c.id===activeId?' active':'');
    const t=document.createElement('div'); t.className='t'; t.textContent=c.title||'New chat'; row.appendChild(t);
    const ren=document.createElement('button'); ren.className='act'; ren.textContent='✎'; ren.title='Rename';
    ren.onclick=e=>{ e.stopPropagation(); const nt=prompt('Rename conversation:',c.title); if(nt&&nt.trim()) api('POST','/api/rename',{id:c.id,title:nt.trim()}).then(loadConvs); };
    const del=document.createElement('button'); del.className='act'; del.textContent='×'; del.title='Delete';
    del.onclick=async e=>{ e.stopPropagation(); if(!confirm('Delete this conversation?'))return; const d=await api('POST','/api/delete',{id:c.id}); activeId=d.active; renderConvs(d.conversations); openConv(activeId); };
    row.appendChild(ren); row.appendChild(del); row.onclick=()=>openConv(c.id); convlist.appendChild(row);
  }
}
function renderMessages(messages){
  log.innerHTML='';
  if(!messages || !messages.length){ log.innerHTML='<div class="empty">Send a message to start.</div>'; afterTurn(); return; }
  for(const m of messages){ const b=bubble(m.role==='user'?'user':'asst'); b.innerHTML=md(m.content); addCopy(b); }
  log.scrollTop=log.scrollHeight; afterTurn();
}
async function openConv(id){ if(busy)return; const c=await api('POST','/api/select',{id}); if(c&&c.id){ activeId=c.id; renderMessages(c.messages); } loadConvs(); closeDrawer(); }
async function newChat(){ if(busy)return; const c=await api('POST','/api/new'); activeId=c.id; renderMessages([]); loadConvs(); closeDrawer(); box.focus(); }

// ---- generation ----
function setBusy(b){ busy=b; sendBtn.textContent=b?'Stop':'Send'; sendBtn.classList.toggle('stopbtn',b); sendBtn.disabled=(!b && !ready); if(b) $('regen').hidden=true; }
function afterTurn(){ const last=log.lastElementChild; $('regen').hidden=!(last && last.classList.contains('asst') && !busy); }
async function streamTo(b,url,body){
  let raw='', buf='';
  const feed=t=>{ buf+=t; let parts=buf.split('\n\n'); buf=parts.pop();
    for(const p of parts){ if(!p.startsWith('data: '))continue; let j; try{j=JSON.parse(p.slice(6));}catch(_){continue;}
      if(j.delta){ raw+=j.delta; b.innerHTML=md(raw); log.scrollTop=log.scrollHeight; }
      if(j.done){ perf.textContent=`${j.tokens} tokens · ${j.tok_s} tok/s · ${j.secs}s`; } } };
  try{ const r=await fetch(url,{method:'POST',headers:body?{'Content-Type':'application/json'}:{},body:body?JSON.stringify(body):undefined});
    if(r.body && r.body.getReader){ const rd=r.body.getReader(), dec=new TextDecoder(); while(true){ const {value,done}=await rd.read(); if(done)break; feed(dec.decode(value,{stream:true})); } }
    else feed(await r.text());
  }catch(e){ raw+='\n\n_[connection error]_'; b.innerHTML=md(raw); }
  b.classList.remove('cursor'); addCopy(b);
}
async function send(){
  const text=box.value.trim(); if(!text||busy||!ready)return;
  setBusy(true); box.value=''; box.style.height='auto'; perf.textContent='';
  if(log.querySelector('.empty')) log.innerHTML='';
  bubble('user').innerHTML=md(text);
  const b=bubble('asst'); b.classList.add('cursor');
  await streamTo(b,'/api/chat',{message:text});
  setBusy(false); afterTurn(); loadConvs();
  if(!('ontouchstart' in window)) box.focus();
}
async function regenerate(){
  if(busy||!ready)return; const asst=[...log.querySelectorAll('.msg.asst')]; if(!asst.length)return;
  asst[asst.length-1].remove(); setBusy(true); perf.textContent='';
  const b=bubble('asst'); b.classList.add('cursor');
  await streamTo(b,'/api/regenerate',null);
  setBusy(false); afterTurn(); loadConvs();
}
sendBtn.onclick=()=>{ if(busy) api('POST','/api/stop'); else send(); };
$('regen').onclick=regenerate;

// ---- status / model / temperature ----
async function poll(){
  try{ const s=await api('GET','/api/status'); ready=s.ready;
    const sel=$('model'); if(sel.options.length!==(s.models||[]).length){ sel.innerHTML=''; for(const m of s.models){ const o=document.createElement('option'); o.value=m; o.textContent=m; sel.appendChild(o); } }
    if(s.model) sel.value=s.model;
    if(document.activeElement!==$('temp')){ $('temp').value=s.temp; $('tempval').textContent=(+s.temp).toFixed(1); }
    dot.classList.toggle('ready',ready);
    sub.textContent = ready ? `${s.model} · K=${s.k} · temp ${(+s.temp).toFixed(1)}` : 'loading model…';
    if(!busy) sendBtn.disabled=!ready;
  }catch(e){ sub.textContent='server offline'; ready=false; }
  if(!ready) setTimeout(poll,1200);
}
$('gear').onclick=()=>$('settings').classList.toggle('open');
$('temp').oninput=()=>$('tempval').textContent=(+$('temp').value).toFixed(1);
$('temp').onchange=()=>api('POST','/api/temp',{temp:+$('temp').value});
$('model').onchange=()=>{ const m=$('model').value; ready=false; dot.classList.remove('ready'); sub.textContent='switching to '+m+'… (~20s)'; sendBtn.disabled=true; api('POST','/api/model',{model:m}); poll(); };

// ---- mobile drawer ----
function openDrawer(){ $('sidebar').classList.add('open'); $('scrim').classList.add('open'); }
function closeDrawer(){ $('sidebar').classList.remove('open'); $('scrim').classList.remove('open'); }
$('menu').onclick=openDrawer; $('scrim').onclick=closeDrawer;
$('newchat').onclick=newChat;
box.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } });
box.addEventListener('input',()=>{ box.style.height='auto'; box.style.height=Math.min(box.scrollHeight,160)+'px'; });

// ---- attach a local file (client-side only) ----
const langOf=n=>({py:'python',cpp:'cpp',c:'c',h:'cpp',hpp:'cpp',ps1:'powershell',sh:'bash',md:'markdown',html:'html',css:'css',js:'javascript',json:'json'}[n.split('.').pop().toLowerCase()]||'');
function insertFile(file){
  if(file.size>512*1024 && !confirm(`${file.name} is ${(file.size/1024).toFixed(0)} KB — large files take a while to ingest (no batched prefill). Attach anyway?`)) return;
  const r=new FileReader();
  r.onload=()=>{ box.value='Here is `'+file.name+'`:\n\n```'+langOf(file.name)+'\n'+r.result+'\n```\n\n'+box.value; box.dispatchEvent(new Event('input')); box.focus(); };
  r.readAsText(file);
}
$('attach').onclick=()=>$('fileinput').click();
$('fileinput').onchange=e=>{ if(e.target.files[0]) insertFile(e.target.files[0]); e.target.value=''; };
box.addEventListener('dragover',e=>{ e.preventDefault(); box.classList.add('drag'); });
box.addEventListener('dragleave',()=>box.classList.remove('drag'));
box.addEventListener('drop',e=>{ e.preventDefault(); box.classList.remove('drag'); if(e.dataTransfer.files[0]) insertFile(e.dataTransfer.files[0]); });

// iOS Safari: pin the app to the visual viewport (keyboard / dynamic toolbar).
(function(){ var vv=window.visualViewport; if(!vv) return;
  function fit(){ $('app').style.height=vv.height+'px'; log.scrollTop=log.scrollHeight; }
  vv.addEventListener('resize',fit); vv.addEventListener('scroll',fit); fit(); })();

// ---- boot ----
poll();
(async()=>{ await loadConvs(); if(activeId){ const c=await api('POST','/api/select',{id:activeId}); renderMessages(c.messages); } })();
if(!('ontouchstart' in window)) box.focus();
</script>
</body>
</html>
